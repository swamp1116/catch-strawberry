<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>딸기 잡기 🍓🍌</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      overscroll-behavior: none;
    }
    #game-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: #0a0a14;
      overflow: hidden;
    }
    /* 게임 캔버스 - 9:16 비율 유지 */
    #game-stage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #0a0a14;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(255, 100, 200, 0.15);
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    /* HUD */
    #hud {
      position: absolute;
      top: 20px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 24px;
      pointer-events: none;
      z-index: 10;
      color: #fff;
      font-weight: 700;
    }
    .hud-box {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    .hud-box .label {
      font-size: 9px;
      opacity: 0.6;
      display: block;
      text-transform: uppercase;
      margin-bottom: 2px;
      line-height: 1.25;
    }
    .hud-box .value {
      font-size: 18px;
      font-weight: 800;
    }
    /* 화면 오버레이 (타이틀, 게임오버) */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 20;
      color: #fff;
      text-align: center;
      padding: 40px 32px;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .overlay.hidden { display: none; }
    /* 영어 보조 텍스트 (한글 아래 작게) */
    .en {
      font-size: 0.75em;
      opacity: 0.7;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .overlay h2 .en {
      display: block;
      margin-top: 2px;
      font-size: 0.55em;
      opacity: 0.65;
    }
    /* 타이틀 화면 - 풀스크린 이미지 배경 */
    #title-screen {
      background: #000 url('assets/title_screen.png') center center / cover no-repeat;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: 0;
      justify-content: flex-end;
      padding-bottom: 60px;
    }
    #title-screen.hidden { display: none; }
    /* 타이틀 화면의 투명 시작 영역 (이미지 자체가 'TAP TO START' 표시) */
    #title-screen .tap-area {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      cursor: pointer;
      z-index: 30;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      /* 모바일에서 더블탭 줌 방지 */
      user-select: none;
      -webkit-user-select: none;
    }
    .overlay h1 {
      font-size: 38px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ff4d6d 0%, #ffd60a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .overlay h2 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .overlay p {
      font-size: 15px;
      opacity: 0.85;
      margin-bottom: 6px;
      line-height: 1.5;
      max-width: 280px;
    }
    .overlay .big-number {
      font-size: 64px;
      font-weight: 900;
      margin: 16px 0;
      background: linear-gradient(135deg, #ffd60a 0%, #ff4d6d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .overlay .best {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(135deg, #ff4d6d 0%, #c9184a 100%);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
      transition: transform 0.1s, box-shadow 0.2s;
      margin: 6px;
      pointer-events: auto;
    }
    .btn:active {
      transform: scale(0.96);
    }
    .btn.secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }
    .hint {
      margin-top: 24px;
      font-size: 13px;
      opacity: 0.55;
      max-width: 260px;
    }
    .pulse {
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    /* HOLD 표시 */
    #hold-indicator {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.7);
      padding: 10px 20px;
      text-align: center;
      line-height: 1.3;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #hold-indicator.show { opacity: 1; }
    #hold-indicator.holding {
      background: rgba(255, 77, 109, 0.3);
      color: #fff;
      border-color: rgba(255, 77, 109, 0.5);
    }
    /* 음소거 버튼 */
    #mute-btn {
      position: absolute;
      top: 70px;
      right: 24px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      z-index: 11;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: transform 0.1s;
    }
    #mute-btn:active { transform: scale(0.92); }
    /* 위험 경고 (예비동작 중 화면 빨간 테두리) */
    #danger-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 0 0 rgba(255, 0, 50, 0);
      transition: box-shadow 0.15s;
      z-index: 8;
    }
    #danger-flash.warning {
      box-shadow: inset 0 0 60px 8px rgba(255, 50, 80, 0.55);
    }
    /* 거울 경고 (노란색) - 거울 발동 알림 */
    #danger-flash.mirror-warning {
      box-shadow:
        inset 0 0 80px 12px rgba(255, 200, 0, 0.7),
        inset 0 0 30px 4px rgba(255, 230, 100, 0.5) !important;
    }
  </style>
</head>
<body>
  <!-- iOS Safari 무음모드 우회 - 페이지가 audio를 사용한다고 명시
       이게 없으면 iOS는 Web Audio API를 무음 처리할 수 있음 -->
  <audio id="ios-audio-unlocker" playsinline preload="auto" style="display:none;"
         src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAABJbmZvAAAADwAAAAEAAAQAACtHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0f/////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAJAAAAAAAAABAB1mwn6AAAAAAAAAAAAAAAAAAAA//tQxAADwAABpAAAACAAADSAAAAETEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVU=">
  </audio>
  <div id="game-container">
    <div id="game-stage">
      <canvas id="game-canvas"></canvas>
      <div id="danger-flash"></div>
      <div id="hud">
        <div class="hud-box">
          <span class="label">거리<br>Distance</span>
          <span class="value" id="distance">0m</span>
        </div>
        <div class="hud-box">
          <span class="label">최고기록<br>Best</span>
          <span class="value" id="best">0m</span>
        </div>
      </div>
      <button id="mute-btn" title="소리 켜기/끄기 / Toggle sound">🔊</button>
      <div id="hold-indicator">눌러서 전진<br><span class="en">Hold to walk</span></div>

      <!-- 타이틀 화면 (풀스크린 이미지) -->
      <div class="overlay" id="title-screen">
        <div class="tap-area" id="start-btn"></div>
      </div>

      <!-- 게임오버 화면 -->
      <div class="overlay hidden" id="gameover-screen">
        <h2>🍌 들켰다!<br><span class="en">CAUGHT!</span></h2>
        <div class="big-number" id="final-distance">0m</div>
        <div class="best" id="final-best">최고기록 0m</div>
        <button class="btn" id="retry-btn">다시 도전 / Retry</button>
        <button class="btn secondary" id="share-btn">공유하기 / Share</button>
      </div>
    </div>
  </div>

  <!-- PixiJS CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.0/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
